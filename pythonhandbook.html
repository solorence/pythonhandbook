  <style>
    /* Mobile-First Reset & Variablized Design Tokens */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --accent-dark: #0F6E56;
      --accent-text: #085041;
      
      /* Light Theme Defaults */
      --bg-primary: #ffffff;
      --bg-secondary: #f7f9fa;
      --text-primary: #1a1a1a;
      --text-secondary: #5e696d;
      --border-color: #e1e4e6;
      
      --badge-core-bg: #E1F5EE;
      --badge-core-txt: #085041;
      --badge-inter-bg: #E6F1FB;
      --badge-inter-txt: #0C447C;
      --badge-adv-bg: #FAEEDA;
      --badge-adv-txt: #633806;
      --pre-bg: #f0f3f5;
    }

    /* Dark Theme Token Overrides */
    [data-theme="dark"] {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --border-color: #333333;
      
      --badge-core-bg: #0b3427;
      --badge-core-txt: #a3eccd;
      --badge-inter-bg: #092543;
      --badge-inter-txt: #a0ccf7;
      --badge-adv-bg: #3a2205;
      --badge-adv-txt: #f3ce9e;
      --pre-bg: #181818;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 1rem;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Header Bar Settings */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Theme Toggle Button Style */
    .theme-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    /* Progress Mechanics */
    .pbar {
      background: var(--bg-secondary);
      border-radius: 20px;
      height: 8px;
      margin-bottom: 4px;
      overflow: hidden;
    }
    .pfill {
      background: var(--accent);
      height: 100%;
      width: 0%;
      border-radius: 20px;
      transition: width .4s ease;
    }
    .ptxt {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    /* Responsive Grid for Stats Card Dashboard */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .sc {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .sn { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .sl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* Horizontally Swipeable Navigation Filter for Mobile Screens */
    .nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 1.25rem;
      scrollbar-width: none; /* Hide for Firefox */
    }
    .nav::-webkit-scrollbar { display: none; } /* Hide for Chrome/Safari */
    
    .tb {
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tb.act { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tb.fin { border-color: var(--accent); color: var(--accent); }

    /* Topic Accordion UI Setup */
    .sec { display: none; }
    .sec.act { display: block; }
    .stitle { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .ssub { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
    
    .tp {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 10px;
      background: var(--bg-primary);
      overflow: hidden;
    }
    .th {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      cursor: pointer;
      gap: 10px;
    }
    .th:hover { background: var(--bg-secondary); }
    .tlbl { font-size: 15px; font-weight: 500; color: var(--text-primary); flex: 1; }
    
    .tbadge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .bc { background: var(--badge-core-bg); color: var(--badge-core-txt); }
    .bi { background: var(--badge-inter-bg); color: var(--badge-inter-txt); }
    .ba { background: var(--badge-adv-bg); color: var(--badge-adv-txt); }
    
    .chev {
      transition: transform .25s;
      font-size: 14px;
      color: var(--text-secondary);
      display: inline-block;
    }
    .chev.op { transform: rotate(180deg); }

    /* Container content body formatting */
    .tbody { display: none; padding: 14px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); }
    .tbody.op { display: block; }
    .tbody p { font-size: 14px; color: var(--text-primary); margin-bottom: 10px; }
    .tbody ul { font-size: 14px; color: var(--text-primary); padding-left: 18px; margin-bottom: 10px; }
    
    /* Codeblock Optimization for Small Screens to prevent breakages */
    pre {
      background: var(--pre-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 12.5px;
      color: var(--text-primary);
      overflow-x: auto;
      margin: 8px 0 12px;
      white-space: pre;
    }

    /* Quiz Elements Optimized for Easy Thumb Tapping */
    .qbox { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-top: 12px; }
    .qq { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .qopts button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin-bottom: 6px;
      font-size: 13.5px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      cursor: pointer;
    }
    .qopts button.ok { background: var(--badge-core-bg); border-color: var(--accent); color: var(--badge-core-txt); font-weight: bold; }
    .qopts button.no { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
    [data-theme="dark"] .qopts button.no { background: #4c1c1c; border-color: #e24b4a; color: #fcc9c9; }
    
    .qfb { font-size: 13px; margin-top: 8px; padding: 8px 12px; border-radius: 6px; }
    .fb-ok { background: var(--badge-core-bg); color: var(--badge-core-txt); }
    .fb-no { background: #FCEBEB; color: #791F1F; }
    [data-theme="dark"] .fb-no { background: #4c1c1c; color: #fcc9c9; }

    .mdb {
      margin-top: 12px;
      font-size: 13.5px;
      padding: 10px 16px;
      width: 100%; /* Full width execution button on mobile devices */
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
    }
    .mdb:disabled { background: var(--border-color); color: var(--text-secondary); cursor: default; }

    /* Smooth Tablet Scaling Enhancement rules */
    @media(min-width:601px) {
      body { max-width: 650px; margin: 0 auto; padding: 2rem 1rem; }
      h1 { font-size: 26px; }
      .stats { grid-template-columns: repeat(4, 1fr); }
      .mdb { width: auto; }
    }
  </style>
</head>

{id:"decs",label:"Decorators",level:"adv",content:`<p>A decorator wraps a function to add behaviour before or after it runs.</p>
<pre>import time

def timer(func):
    def wrapper(*args, **kwargs):
        start  = time.time()
        result = func(*args, **kwargs)
        print(f"{func.__name__} took {time.time()-start:.4f}s")
        return result
    return wrapper

@timer
def slow_task():
    time.sleep(1)
    print("Done")

slow_task()
# Done
# slow_task took 1.0012s

class MyClass:
    @staticmethod         # no self needed
    def utility():
        return "static"

    @classmethod          # receives class
    def from_data(cls, data):
        return cls()

    @property             # access like attribute
    def name(self):
        return self._name</pre>`,

<pre>import re

text = "Call me on 0801-234-5678 or 0901-987-6543"

phones = re.findall(r'\d{4}-\d{3}-\d{4}', text)
# ['0801-234-5678', '0901-987-6543']

# search — first match (or None)
m = re.search(r'\d+', "Price: 5000 naira")
if m:
    print(m.group())   # '5000'

# match — only at START of string
re.match(r'\d+', "5000 naira")    # match
re.match(r'\d+', "Price: 5000")   # None

# sub — replace pattern
clean = re.sub(r'\s+', ' ', "too   many    spaces")
# 'too many spaces'

# ['a', 'b', 'c', 'd']</pre>`,

{id:"regex_patterns",label:"Pattern reference",level:"inter",content:`<p>The patterns you will use 90% of the time:</p>
<pre># CHARACTER CLASSES
.       any character except newline
\d      digit 0-9
\D      not a digit
\w      word char (letters, digits, _)
\W      not a word char
\s      whitespace
\S      not whitespace
[abc]   a or b or c
[a-z]   any lowercase letter
[^abc]  NOT a, b, or c

# QUANTIFIERS
* 0 or more
+       1 or more
?       0 or 1  (optional)
{3}     exactly 3
{2,5}   between 2 and 5

# ANCHORS
^       start of string
$       end of string
\b      word boundary

# GROUPS
(abc)   capture group
a|b     a or b</pre>
<pre># REAL-WORLD PATTERNS
# Email
r'[\w.-]+@[\w.-]+\.\w+'

# Nigerian phone number
r'0[789]\d{9}'

# Date dd/mm/yyyy
r'\d{2}/\d{2}/\d{4}'

# Price
r'₦[\d,]+'

# Extract numbers from text
re.findall(r'\d+\.?\d*', "Cost: 1500.50")
# ['1500.50']</pre>`,

{id:"regex_groups",label:"Groups & extraction",level:"inter",content:`<pre>import re

# Named groups — most readable
text = "Name: Ifeanyi Okafor, Age: 30"
pattern = r'Name: (?P&lt;name&gt;[\w ]+), Age: (?P&lt;age&gt;\d+)'
m = re.search(pattern, text)
if m:
    print(m.group('name'))   # Ifeanyi Okafor
    print(m.group('age'))    # 30

# finditer — multiple matches with groups
dates = "Born: 15/08/1993, Joined: 01/06/2020"
for m in re.finditer(r'(\d{2})/(\d{2})/(\d{4})', dates):
    day, month, year = m.group(1), m.group(2), m.group(3)
    print(f"Day:{day} Month:{month} Year:{year}")

# Practical: extract prices
html = '&lt;span&gt;₦12,500&lt;/span&gt; and ₦8,000'
prices = re.findall(r'₦([\d,]+)', html)
# ['12,500', '8,000']
nums = [int(p.replace(',','')) for p in prices]
# [12500, 8000]</pre>`,

{id:"classes",label:"Classes & objects",level:"inter",content:`<pre>class BankAccount:
    bank_name = "Python Bank"     # class variable

    def __init__(self, owner, balance=0):
        self.owner  = owner       # instance variables
        self.balance = balance
        self._history = []        # _ = private by convention

    def deposit(self, amount):
        self.balance += amount
        self._history.append(f"+{amount}")

    def withdraw(self, amount):
        if amount > self.balance:
            raise ValueError("Insufficient funds")
        self.balance -= amount

    def __str__(self):    # what print(obj) shows
        return f"{self.owner}: ₦{self.balance:,}"

    def __repr__(self):   # developer representation
        return f"BankAccount('{self.owner}', {self.balance})"

import pandas as pd

all_data = []
session  = requests.Session()
session.headers.update({"User-Agent":"Mozilla/5.0"})

for page in range(1, 11):
    url = f"https://books.toscrape.com/catalogue/page-{page}.html"
    try:
        r = session.get(url, timeout=10)
        r.raise_for_status()
    except requests.RequestException as e:
        print(f"Page {page} failed: {e}")
        continue

    soup = BeautifulSoup(r.content, "html.parser")
    for book in soup.find_all("article", class_="product_pod"):
        all_data.append({
            "title": book.h3.a["title"],
            "price": book.find("p","price_color").text.strip(),
            "page" : page
        })

    print(f"Page {page}: {len(all_data)} total")
    time.sleep(random.uniform(1, 2.5))   # random delay!

pd.DataFrame(all_data).to_excel("scraped.xlsx", index=False)</pre>
<p>Golden rules: always use delays, handle errors with try/except, use sessions, set a User-Agent, never scrape faster than a human browses.</p>`,

<pre>def count_up(limit):
    n = 0
    while n < limit:
        yield n       # pause and return value
        n += 1

for num in count_up(5):
    print(num)        # 0 1 2 3 4

gen = count_up(3)
next(gen)   # 0
next(gen)   # 1

    with open(filename) as f:
        header = next(f)
        for line in f:
            yield line.strip().split(",")

for row in read_large_csv("huge.csv"):
    process(row)   # only one row in memory</pre>`,

  try { localStorage.setItem('ph3_theme', newTheme); } catch(e) {}
}

function sv2(){try{localStorage.setItem('ph3_done',JSON.stringify([...done]))}catch(e){}}

function upd(){
  const d=done.size,pct=Math.round(d/total*100);
  document.getElementById('sd').textContent=d;
  document.getElementById('st').textContent=total;
  document.getElementById('sp').textContent=pct+'%';
  document.getElementById('ss').textContent=streak+'🔥';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${d} of ${total} topics completed — ${pct}%`;
  S.forEach((s,i)=>{
    const b=document.getElementById('nt'+i);
    if(b) b.classList.toggle('fin',s.topics.every(t=>done.has(t.id)));
  });
}

function bclass(l){return l==='core'?'bc':l==='inter'?'bi':'ba'}
function blabel(l){return l==='core'?'Core':l==='inter'?'Intermediate':'Advanced'}

function tHTML(t){
  const d=done.has(t.id);
  const q=t.quiz;
  const qh=q?`<div class="qbox">
    <div class="qq">Quick check: ${q.q}</div>
    <div class="qopts" id="qo${t.id}">${q.opts.map((o,i)=>`<button onclick="ans('${t.id}',${i})">${o}</button>`).join('')}</div>
    <div id="qf${t.id}"></div>
  </div>`:'';
  return `<div class="tp" id="tp${t.id}">
    <div class="th" onclick="tog('${t.id}')">
      <span class="tlbl"><span style="${d?'text-decoration:line-through;color:var(--text-secondary)':''}">${d?'✓ ':''}${t.label}</span></span>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span class="tbadge ${bclass(t.level)}">${blabel(t.level)}</span>
        <span class="chev" id="cv${t.id}">▼</span>
      </div>
    </div>
    <div class="tbody" id="bd${t.id}">${t.content}${qh}<button class="mdb" id="mb${t.id}" onclick="mkd('${t.id}')" ${d?'disabled':''}>${d?'✓ Reviewed':'Mark as reviewed ✓'}</button></div>
  </div>`;
}

function renderNav(){
  document.getElementById('nav').innerHTML=S.map((s,i)=>
    `<button class="tb${i===ai?' act':''}" id="nt${i}" onclick="show(${i})">${s.label}</button>`
  ).join('');
}

function renderSecs(){
  document.getElementById('secs').innerHTML=S.map((s,si)=>`
    <div class="sec${si===ai?' act':''}" id="sc${si}">
      <div class="stitle">${s.label}</div>
      <div class="ssub">Expand topic · do quiz · mark done.</div>
      ${s.topics.map(t=>tHTML(t)).join('')}
    </div>`).join('');
}

function show(i){
  ai=i;
  document.querySelectorAll('.sec').forEach((s,si)=>s.classList.toggle('act',si===i));
  document.querySelectorAll('.tb').forEach((b,bi)=>b.classList.toggle('act',bi===i));
  qs={};
}

function tog(id){
  const bd=document.getElementById('bd'+id);
  const cv=document.getElementById('cv'+id);
  const open=bd.classList.contains('op');
  document.querySelectorAll('.tbody.op').forEach(b=>b.classList.remove('op'));
  document.querySelectorAll('.chev.op').forEach(c=>c.classList.remove('op'));
  if(!open){bd.classList.add('op');cv.classList.add('op');}
}

function ans(tid,chosen){
  if(qs[tid]) return;
  qs[tid]=true;
  const t=S.flatMap(s=>s.topics).find(x=>x.id===tid);
  const q=t.quiz;
  document.querySelectorAll(`#qo${tid} button`).forEach((b,i)=>{
    if(i===q.ans) b.classList.add('ok');
    else if(i===chosen) b.classList.add('no');
    b.disabled=true;
  });
  document.getElementById('qf'+tid).innerHTML=`<div class="qfb ${chosen===q.ans?'fb-ok':'fb-no'}">${chosen===q.ans?'Correct! ':'Not quite. '}${q.exp}</div>`;
}

function mkd(id){
  done.add(id);sv2();
  const mb=document.getElementById('mb'+id);
  if(mb){mb.textContent='✓ Reviewed';mb.disabled=true;}
  const lbl=document.querySelector(`#tp${id} .tlbl span`);
  if(lbl){
    lbl.style.textDecoration='line-through';
    lbl.style.color='var(--text-secondary)';
    if(!lbl.textContent.startsWith('✓')) {
       lbl.textContent = '✓ ' + lbl.textContent;
    }
  }
  upd();renderNav();
}

renderNav();renderSecs();upd();

// PWA Service Worker Inline Register Strategy 
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      const CACHE_NAME = 'py-handbook-cache-v3';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['./', './index.html'])));
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  });
}
</script>
